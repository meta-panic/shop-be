openapi: 3.0.3
info:
  title: Product Catalog API
  version: 1.0.0
  description: API for product catalog (AWS Lambda + API Gateway)

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    variables:
      apiId:
        default: your-api-id
      region:
        default: eu-central-1
      stage:
        default: prod

paths:
  /products:
    get:
      summary: Get all products
      operationId: getProductsList
      responses:
        "200":
          description: List of products
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{productId}:
    get:
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product found
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

        "400":
          description: Missing product ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: "Product title"
        description:
          type: string
          example: "Product description"
        price:
          type: number
          example: 100
      required:
        - id
        - title
        - price

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Internal server error"
